<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Dreamfall</title>
    <meta
      name="description"
      content="Dreamfall — an experimental browser-based third-person action prototype. Fluid traversal, great sword combat with dynamic cutting, and a streaming procedural city."
    />
    <meta name="theme-color" content="#111111" />
    <meta name="robots" content="index, follow" />

    <!-- Favicon (add favicon.ico or .svg to /public when available) -->
    <link rel="icon" href="/favicon.ico" sizes="any" />

    <!-- Open Graph (Facebook, Discord, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Dreamfall" />
    <meta
      property="og:description"
      content="Dreamfall — an experimental browser-based third-person action prototype. Fluid traversal, great sword combat with dynamic cutting, and a streaming procedural city."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Dreamfall — browser action prototype with sword combat and city traversal" />
    <!-- Update og:url to the full deployed URL (e.g. https://dreamfall.pages.dev) for production -->
    <meta property="og:url" content="https://dreamfall.pages.dev" />
    <meta property="og:site_name" content="Dreamfall" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dreamfall" />
    <meta
      name="twitter:description"
      content="Dreamfall — an experimental browser-based third-person action prototype. Fluid traversal, great sword combat with dynamic cutting, and a streaming procedural city."
    />
    <meta name="twitter:image" content="/og-image.png" />
    <meta name="twitter:image:alt" content="Dreamfall — browser action prototype with sword combat and city traversal" />
    <!-- <meta name="twitter:site" content="@yourhandle" /> -->
    <!-- <meta name="twitter:creator" content="@yourhandle" /> -->

    <!--
      Social image recommendation:
      Place a 1200×630 PNG (or JPG) at /public/og-image.png before deploying.
      For best results use summary_large_image style with good contrast.
    -->
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
